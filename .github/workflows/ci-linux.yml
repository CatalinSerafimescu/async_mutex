name: Linux

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CONAN_HOME: ~/.conan2

jobs:
  linux:
    name: "${{ matrix.preset }}"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        preset:
          - linux-clang-debug
          - linux-clang-release
          - linux-clang-asan
          - linux-clang-ubsan
          - linux-clang-tsan
          - linux-gcc-release

    steps:
      - uses: actions/checkout@v6

      - name: Install Clang 22 (apt.llvm.org) + GCC 13 + Ninja
        run: |
          # Clang 22 matches the pinned dev toolchain. llvm.sh handles the GPG
          # key + apt repo + clang-22/clang++-22/lld-22/llvm-22 packages.
          wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22 all
          # llvm.sh installs versioned binaries (clang-22) but does not update
          # the unversioned clang/clang++ paths, which the CMake presets use.
          # Force-symlink so they resolve to clang-22 instead of the runner's
          # preinstalled older clang.
          CLANG_BIN=$(ls /usr/bin/clang++-* 2>/dev/null | grep -oE '/usr/bin/clang\+\+-[0-9]+$' | sort -V | tail -1)
          CLANG_VER=$(echo "$CLANG_BIN" | grep -oE '[0-9]+$')
          test -n "$CLANG_VER" || { echo "::error::No clang-* installed by llvm.sh"; exit 1; }
          sudo ln -sf /usr/bin/clang-$CLANG_VER   /usr/bin/clang
          sudo ln -sf /usr/bin/clang++-$CLANG_VER /usr/bin/clang++
          clang++ --version
          sudo apt-get install -y --no-install-recommends \
            gcc-13 g++-13 \
            ninja-build \
            pipx

      - name: Install Conan via pipx
        run: |
          pipx install conan
          conan --version

      - name: Initialize Conan default profile
        run: conan profile detect --force

      - name: Teach Conan about Clang 22
        run: |
          # Conan 2.x's stock settings.yml does not enumerate Clang 22 yet.
          # Append via settings_user.yml (additive, non-destructive).
          mkdir -p ~/.conan2
          cat > ~/.conan2/settings_user.yml <<'EOF'
          compiler:
            clang:
              version: ["19", "20", "21", "22", "23"]
          EOF

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2/p
          key: conan-${{ matrix.preset }}-${{ hashFiles('conanfile.py', format('conan/profiles/{0}', matrix.preset)) }}
          restore-keys: |
            conan-${{ matrix.preset }}-

      - name: Conan install
        run: conan install . -pr:h conan/profiles/${{ matrix.preset }} -pr:b conan/profiles/${{ matrix.preset }} -of build/${{ matrix.preset }} -b missing

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure
