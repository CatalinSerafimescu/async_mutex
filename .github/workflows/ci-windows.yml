name: Windows

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: "${{ matrix.preset }}"
    runs-on: windows-2022
    env:
      CONAN_HOME: C:\Users\runneradmin\.conan2
    strategy:
      fail-fast: false
      matrix:
        preset:
          - windows-msvc-debug
          - windows-msvc-release
          - windows-msvc-asan

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: pip install conan

      - name: Install Ninja
        run: choco install ninja --no-progress -y

      - name: Initialize Conan default profile
        run: conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\.conan2\p
          key: conan-win-${{ matrix.preset }}-${{ hashFiles('conanfile.py', format('conan/profiles/{0}', matrix.preset)) }}
          restore-keys: |
            conan-win-${{ matrix.preset }}-

      # ilammy/msvc-dev-cmd runs vcvars and exports the MSVC dev environment
      # (cl.exe on PATH) into the job for the remaining steps.
      - name: Set up MSVC environment (vcvars)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Conan install
        run: conan install . -pr:h conan/profiles/${{ matrix.preset }} -pr:b conan/profiles/${{ matrix.preset }} -of build/${{ matrix.preset }} -b missing

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure
