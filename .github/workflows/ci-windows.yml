name: Windows

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: "${{ matrix.preset }}"
    runs-on: windows-2022
    env:
      CONAN_HOME: C:\Users\runneradmin\.conan2
    strategy:
      fail-fast: false
      matrix:
        preset:
          - windows-msvc-debug
          - windows-msvc-release
          - windows-msvc-asan

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Conan
        run: pip install conan

      - name: Install Ninja
        run: choco install ninja --no-progress -y

      - name: Initialize Conan default profile
        run: conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: C:\Users\runneradmin\.conan2\p
          key: conan-win-${{ matrix.preset }}-${{ hashFiles('conanfile.py', format('conan/profiles/{0}', matrix.preset)) }}
          restore-keys: |
            conan-win-${{ matrix.preset }}-

      # vs-shell activates the full MSVC dev environment (cl.exe + vcvars) and
      # exports it via GITHUB_ENV so it persists into the later steps. It is a
      # composite (pure-PowerShell) action — no Node runtime — so it avoids the
      # Node-20-deprecation warning that node20-based ilammy/msvc-dev-cmd emits
      # (that action has no Node-24 release).
      - name: Set up MSVC environment (vcvars)
        uses: egor-tensin/vs-shell@v2

      - name: Conan install
        run: conan install . -pr:h conan/profiles/${{ matrix.preset }} -pr:b conan/profiles/${{ matrix.preset }} -of build/${{ matrix.preset }} -b missing

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure
