name: Coverage

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CONAN_HOME: ~/.conan2
  # The library is header-only: exactly one production source file. Coverage
  # must be reported and gated against THIS file, not the test harness.
  HEADER: include/catseraf/sync/async_mutex.hpp

jobs:
  coverage:
    name: linux-clang-coverage
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Clang 22 (apt.llvm.org) + Ninja
        run: |
          wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22 all
          CLANG_BIN=$(ls /usr/bin/clang++-* 2>/dev/null | grep -oE '/usr/bin/clang\+\+-[0-9]+$' | sort -V | tail -1)
          CLANG_VER=$(echo "$CLANG_BIN" | grep -oE '[0-9]+$')
          test -n "$CLANG_VER" || { echo "::error::No clang-* installed by llvm.sh"; exit 1; }
          sudo ln -sf /usr/bin/clang-$CLANG_VER   /usr/bin/clang
          sudo ln -sf /usr/bin/clang++-$CLANG_VER /usr/bin/clang++
          clang++ --version
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            pipx

      - name: Install Conan via pipx
        run: |
          pipx install conan
          conan --version

      - name: Initialize Conan default profile
        run: conan profile detect --force

      - name: Teach Conan about Clang 22
        run: |
          mkdir -p ~/.conan2
          cat > ~/.conan2/settings_user.yml <<'EOF'
          compiler:
            clang:
              version: ["19", "20", "21", "22", "23"]
          EOF

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-linux-clang-coverage-${{ hashFiles('conanfile.py', 'conan/profiles/linux-clang-coverage') }}
          restore-keys: |
            conan-linux-clang-coverage-

      - name: Conan install
        run: conan install . -pr:h conan/profiles/linux-clang-coverage -pr:b conan/profiles/linux-clang-coverage -of build/linux-clang-coverage -b missing

      - name: Configure
        run: cmake --preset linux-clang-coverage

      - name: Build
        run: cmake --build --preset linux-clang-coverage

      - name: Test (collect profiles)
        env:
          # %p embeds the PID so each test binary writes its own .profraw file
          # instead of overwriting a shared one (ctest runs multiple binaries).
          LLVM_PROFILE_FILE: "${{ github.workspace }}/build/linux-clang-coverage/profiles/default-%p.profraw"
        run: |
          mkdir -p build/linux-clang-coverage/profiles
          ctest --preset linux-clang-coverage --output-on-failure

      - name: Merge coverage profiles
        run: |
          llvm-profdata-22 merge -sparse \
            build/linux-clang-coverage/profiles/*.profraw \
            -o build/linux-clang-coverage/coverage.profdata

      - name: Report + enforce header coverage floor
        run: |
          set -euo pipefail
          # Enumerate every instrumented test binary under bin/ — the exact
          # binary name(s) are owned by tests/CMakeLists.txt (Phase 2/3), so
          # discover them rather than hardcoding one.
          OBJECTS=""
          MAIN=""
          for b in build/linux-clang-coverage/tests/*; do
            [ -f "$b" ] && [ -x "$b" ] || continue
            if [ -z "$MAIN" ]; then
              MAIN="$b"
            else
              OBJECTS="$OBJECTS -object $b"
            fi
          done
          test -n "$MAIN" || { echo "::error::No instrumented test binaries found under build/linux-clang-coverage/tests/"; exit 1; }

          # Human-readable summary in the job log only — NOT parsed. The
          # `report` table's column layout can shift across llvm-cov versions
          # (region/branch summary columns are conditionally present), so the
          # gate below parses the JSON export instead, whose schema is stable.
          llvm-cov-22 report \
            --instr-profile=build/linux-clang-coverage/coverage.profdata \
            --show-branch-summary \
            "$MAIN" $OBJECTS \
            "$HEADER"

          COV=$(llvm-cov-22 export --summary-only \
            --instr-profile=build/linux-clang-coverage/coverage.profdata \
            "$MAIN" $OBJECTS \
            "$HEADER")
          LINE_PCT=$(echo "$COV" | jq '[.data[0].files[] | select(.filename | test("async_mutex\\.hpp$"))][0].summary.lines.percent')
          BRANCH_PCT=$(echo "$COV" | jq '[.data[0].files[] | select(.filename | test("async_mutex\\.hpp$"))][0].summary.branches.percent')
          if [ -z "$LINE_PCT" ] || [ "$LINE_PCT" = "null" ]; then
            echo "::error::Could not find $HEADER in the llvm-cov JSON summary"; exit 1
          fi
          echo "Header line coverage:   ${LINE_PCT}%"
          echo "Header branch coverage: ${BRANCH_PCT}%"

          # Non-brittle floor: origin (fixpp 058) measured 91.1% line / 72.3%
          # branch on this exact header. Fail only if the ported suite drifts
          # materially below that, not on an exact-match regression.
          awk -v l="$LINE_PCT" -v b="$BRANCH_PCT" 'BEGIN { exit !(l < 90 || b < 71) }' && \
            { echo "::error::Header coverage below floor (line ${LINE_PCT}% < 90% or branch ${BRANCH_PCT}% < 71%) — baseline was 91.1% line / 72.3% branch."; exit 1; }
          echo "Header coverage meets the floor (line >= 90%, branch >= 71%)."

      - name: Generate LCOV report (header only)
        run: |
          OBJECTS=""
          MAIN=""
          for b in build/linux-clang-coverage/tests/*; do
            [ -f "$b" ] && [ -x "$b" ] || continue
            if [ -z "$MAIN" ]; then
              MAIN="$b"
            else
              OBJECTS="$OBJECTS -object $b"
            fi
          done
          llvm-cov-22 export \
            --format=lcov \
            --instr-profile=build/linux-clang-coverage/coverage.profdata \
            "$MAIN" $OBJECTS \
            "$HEADER" \
            > build/linux-clang-coverage/coverage.lcov

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: build/linux-clang-coverage/coverage.lcov

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/linux-clang-coverage/coverage.lcov
          flags: unittests
          fail_ci_if_error: false
