name: macOS

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CONAN_HOME: ~/.conan2

jobs:
  macos:
    name: "${{ matrix.preset }}"
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        preset:
          - macos-clang-release
          - macos-clang-asan
          - macos-clang-ubsan

    steps:
      - uses: actions/checkout@v6

      # AppleClang lags on C++23 <expected> + coroutines — use Homebrew LLVM
      # instead. The conan profiles point compiler.exe at this clang++, not
      # /usr/bin/clang++.
      - name: Install Homebrew LLVM + Ninja + Conan
        run: brew install llvm ninja conan

      - name: Initialize Conan default profile
        run: conan profile detect --force

      - name: Teach Conan about the installed Homebrew LLVM clang version
        run: |
          # Conan's stock settings.yml may not enumerate whatever clang major
          # `brew install llvm` currently ships. Detect it and append via
          # settings_user.yml (additive, non-destructive) rather than pinning
          # a hardcoded version that will eventually drift from Homebrew's.
          LLVM_PREFIX=$(brew --prefix llvm)
          "$LLVM_PREFIX/bin/clang++" --version
          CLANG_VER=$("$LLVM_PREFIX/bin/clang++" --version | head -1 | grep -oE '[0-9]+' | head -1)
          test -n "$CLANG_VER" || { echo "::error::Could not detect Homebrew LLVM clang version"; exit 1; }
          mkdir -p ~/.conan2
          printf 'compiler:\n  clang:\n    version: ["%s"]\n' "$CLANG_VER" > ~/.conan2/settings_user.yml
          cat ~/.conan2/settings_user.yml

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2/p
          key: conan-${{ matrix.preset }}-${{ hashFiles('conanfile.py', format('conan/profiles/{0}', matrix.preset)) }}
          restore-keys: |
            conan-${{ matrix.preset }}-

      - name: Conan install
        run: conan install . -pr:h conan/profiles/${{ matrix.preset }} -pr:b conan/profiles/${{ matrix.preset }} -of build/${{ matrix.preset }} -b missing

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure
