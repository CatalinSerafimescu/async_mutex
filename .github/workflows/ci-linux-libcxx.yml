name: Linux libc++

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CONAN_HOME: ~/.conan2

jobs:
  libcxx:
    name: "${{ matrix.preset }}"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read   # pull the instrumented-libc++ image from ghcr (TSan leg)
    strategy:
      fail-fast: false
      matrix:
        preset:
          - linux-clang-libc++
          - linux-clang-libc++-asan
          - linux-clang-libc++-ubsan
          - linux-clang-libc++-tsan

    env:
      # libc++.so.1 is installed by apt to /usr/lib/x86_64-linux-gnu (symlinked
      # from /usr/lib/llvm-22/lib) when libc++-22-dev is installed. Set at the
      # job level (not just the Test step) so cmake's gtest_discover_tests step
      # — which runs the test binary during Build to enumerate tests — can find it.
      LD_LIBRARY_PATH: "/usr/lib/x86_64-linux-gnu:/usr/lib/llvm-22/lib:/usr/lib/llvm-22/lib/clang/22/lib/x86_64-unknown-linux-gnu"

    steps:
      - uses: actions/checkout@v6

      - name: Install Clang 22 + libc++ + libc++abi + Ninja (apt.llvm.org)
        run: |
          wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 22 all
          # llvm.sh installs versioned binaries (clang-22) but does not update
          # the unversioned clang/clang++ paths, which the plain
          # linux-clang-libc++ preset uses. Force-symlink for consistency.
          CLANG_BIN=$(ls /usr/bin/clang++-* 2>/dev/null | grep -oE '/usr/bin/clang\+\+-[0-9]+$' | sort -V | tail -1)
          CLANG_VER=$(echo "$CLANG_BIN" | grep -oE '[0-9]+$')
          test -n "$CLANG_VER" || { echo "::error::No clang-* installed by llvm.sh"; exit 1; }
          sudo ln -sf /usr/bin/clang-$CLANG_VER   /usr/bin/clang
          sudo ln -sf /usr/bin/clang++-$CLANG_VER /usr/bin/clang++
          clang++ --version
          # libc++ / libc++abi dev packages are not installed by llvm.sh by default.
          sudo apt-get install -y --no-install-recommends \
            libc++-22-dev \
            libc++abi-22-dev \
            ninja-build \
            pipx

      - name: Install Conan via pipx
        run: |
          pipx install conan
          conan --version

      - name: Initialize Conan default profile
        run: conan profile detect --force

      - name: Teach Conan about Clang 22
        run: |
          mkdir -p ~/.conan2
          cat > ~/.conan2/settings_user.yml <<'EOF'
          compiler:
            clang:
              version: ["19", "20", "21", "22", "23"]
          EOF

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2/p
          key: conan-${{ matrix.preset }}-${{ hashFiles('conanfile.py', format('conan/profiles/{0}', matrix.preset)) }}
          restore-keys: |
            conan-${{ matrix.preset }}-

      - name: Conan install
        run: conan install . -pr:h conan/profiles/${{ matrix.preset }} -pr:b conan/profiles/${{ matrix.preset }} -of build/${{ matrix.preset }} -b missing

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      # TSan only: the apt-installed libc++ is NOT TSan-instrumented, so TSan
      # cannot see libc++'s internal synchronisation and reports FALSE data
      # races in std::future / asio::use_future shared-state teardown (proven
      # instrumentation artifact — see docs/TSAN-LIBCXX-FALSE-POSITIVE.md;
      # reproduce-then-disprove with an instrumented libc++ gives 0 races vs
      # the apt libc++'s reliable trips). Pull a TSan-instrumented libc++
      # (llvmorg-22.1.2, -DLLVM_USE_SANITIZER=Thread, ABI-identical to stock so
      # no relink) and load it ahead of the apt one at test time via
      # LD_LIBRARY_PATH. Ported from fixpp's tier3-libcxx.yml.
      - name: Fetch instrumented libc++ (TSan)
        if: matrix.preset == 'linux-clang-libc++-tsan'
        run: |
          # Pin by DIGEST, not the mutable :22.1.2 tag — this .so is loaded into
          # the test process, so a silently re-pushed tag could fabricate/suppress
          # TSan results. Digest below = the verified-good image (tag 22.1.2).
          # To roll forward: re-push, then update this digest + the comment.
          IMG="ghcr.io/catalinserafimescu/fixpp-libcxx-tsan@sha256:65106764ae2318bf1e982216d84b0d45ec9c9245cb25a59728aab59f016ea161"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker pull "$IMG"
          cid=$(docker create "$IMG")
          docker cp "$cid:/libcxx-tsan" "$RUNNER_TEMP/libcxx-tsan"
          docker rm "$cid"
          ls -l "$RUNNER_TEMP/libcxx-tsan"

      - name: Test
        if: matrix.preset != 'linux-clang-libc++-tsan'
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Test (TSan — instrumented libc++)
        if: matrix.preset == 'linux-clang-libc++-tsan'
        env:
          # Prepend the instrumented libc++ ahead of the apt libc++ in the
          # job-level LD_LIBRARY_PATH so the soname resolves to it at runtime.
          LD_LIBRARY_PATH: ${{ runner.temp }}/libcxx-tsan:${{ env.LD_LIBRARY_PATH }}
        run: ctest --preset ${{ matrix.preset }} --output-on-failure
